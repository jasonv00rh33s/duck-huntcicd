name: CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Flake8 Linter
      run: |
        # Запуск лінтера з генерацією HTML-звіту
        flake8 src tests --format=html --htmldir=flake8_report --exit-zero

    - name: Upload Flake8 Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: flake8-html-report
        path: flake8_report/

    - name: Run Pytest
      # Необхідно для запуску Pygame на сервері без монітора (headless mode)
      env:
        SDL_VIDEODRIVER: dummy
      run: |
        # Запуск тестів з генерацією єдиного HTML-файлу
        pytest tests/ --html=pytest_report/report.html --self-contained-html

    - name: Upload Pytest Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: pytest-html-report
        path: pytest_report/
